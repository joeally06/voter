<!-- Keyboard Shortcuts Overlay Template -->
<!-- Note: The keyboard shortcuts overlay is dynamically created by keyboard-controller.js -->
<!-- This template serves as a fallback/reference for the keyboard shortcuts help content -->
<div class="vp-kbd-overlay" id="keyboard-shortcuts-overlay">
    <div class="vp-kbd-overlay__content">
        <div class="vp-kbd-overlay__header">
            <h2 class="vp-kbd-overlay__title">
                <i class="bi bi-keyboard"></i> Keyboard Shortcuts
            </h2>
            <button class="vp-kbd-overlay__close" aria-label="Close keyboard shortcuts" data-dismiss="keyboard-overlay">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div class="vp-kbd-overlay__section">
            <h3 class="vp-kbd-overlay__section-title">Navigation</h3>
            <div class="vp-kbd-overlay__item">
                <span class="vp-kbd-overlay__description">Route Planning tab</span>
                <span class="vp-kbd-overlay__keys"><kbd class="vp-kbd">1</kbd></span>
            </div>
            <div class="vp-kbd-overlay__item">
                <span class="vp-kbd-overlay__description">Analytics tab</span>
                <span class="vp-kbd-overlay__keys"><kbd class="vp-kbd">2</kbd></span>
            </div>
            <div class="vp-kbd-overlay__item">
                <span class="vp-kbd-overlay__description">Focus search</span>
                <span class="vp-kbd-overlay__keys"><kbd class="vp-kbd">/</kbd></span>
            </div>
        </div>
        <div class="vp-kbd-overlay__section">
            <h3 class="vp-kbd-overlay__section-title">Actions</h3>
            <div class="vp-kbd-overlay__item">
                <span class="vp-kbd-overlay__description">Show keyboard shortcuts</span>
                <span class="vp-kbd-overlay__keys"><kbd class="vp-kbd">?</kbd></span>
            </div>
            <div class="vp-kbd-overlay__item">
                <span class="vp-kbd-overlay__description">Close overlays/modals</span>
                <span class="vp-kbd-overlay__keys"><kbd class="vp-kbd">Esc</kbd></span>
            </div>
        </div>
        <div class="vp-kbd-overlay__footer">
            Press <kbd class="vp-kbd">?</kbd> anytime to toggle this help
        </div>
    </div>
</div>
